apiVersion: v1
kind: Namespace
metadata:
  name: gpu-lab
  labels:
    app.kubernetes.io/part-of: gpu-failure-lab
---
# A small PVC used by the PVC-mount failure scenario (and as a checkpoint dir
# for healthy runs). Uses kind's default "standard" storageClass.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: checkpoints
  namespace: gpu-lab
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
