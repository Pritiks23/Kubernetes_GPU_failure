# SCENARIO 02 -- NCCL communication failure (collective timeout).
# A 4-rank job where 2 ranks never reach the rendezvous, so rank 0's NCCL
# watchdog fires a collective timeout and aborts the process group.
# We model it with an indexed Job: ranks get RANK from the pod index; the
# "missing" ranks are simulated inside train.py (FAILURE_MODE=nccl_timeout).
apiVersion: v1
kind: Service
metadata: {name: trainer-nccl, namespace: gpu-lab}
spec:
  clusterIP: None
  selector: {job-name: trainer-nccl}
  ports: [{name: c10d, port: 29500}]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trainer-nccl
  namespace: gpu-lab
  labels: {scenario: nccl-failure}
spec:
  completions: 4
  parallelism: 4
  completionMode: Indexed       # pods get JOB_COMPLETION_INDEX = global rank
  backoffLimit: 0
  template:
    metadata: {labels: {job-name: trainer-nccl}}
    spec:
      restartPolicy: Never
      nodeSelector: {nvidia.com/gpu.present: "true"}
      containers:
        - name: trainer
          image: gpu-lab/trainer:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-c"]
          args:
            - 'RANK=${JOB_COMPLETION_INDEX} exec python /workspace/train.py'
          env:
            - {name: FAILURE_MODE, value: "nccl_timeout"}
            - {name: WORLD_SIZE, value: "4"}
            - {name: MASTER_ADDR, value: "trainer-nccl"}
            - {name: MASTER_PORT, value: "29500"}
            - {name: NCCL_DEBUG, value: "INFO"}
          resources:
            requests: {nvidia.com/gpu: 1, cpu: 150m, memory: 384Mi}
            limits:   {nvidia.com/gpu: 1}
