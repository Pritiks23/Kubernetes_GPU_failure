apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gpu-lab
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      # Scrape the fake DCGM exporters via pod annotations.
      - job_name: dcgm
        kubernetes_sd_configs: [{role: pod, namespaces: {names: [gpu-lab]}}]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port,
                            __meta_kubernetes_pod_ip]
            action: replace
            regex: (.+);(.+)
            replacement: $2:$1
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
      # Scrape kube-state-ish pod phase via kubelet cAdvisor is overkill for the
      # lab; we rely on DCGM metrics + kubectl for pod state.
  alerts.yml: |
    groups:
      - name: gpu-lab
        rules:
          - alert: GpuMemoryNearOOM
            expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
            for: 10s
            labels: {severity: critical}
            annotations:
              summary: "GPU {{ $labels.gpu }} on {{ $labels.node }} >95% memory (OOM risk)"
          - alert: GpuIdleButAllocated
            expr: DCGM_FI_DEV_GPU_UTIL < 20
            for: 30s
            labels: {severity: warning}
            annotations:
              summary: "GPU {{ $labels.gpu }} util <20% (straggler / data-starved / hang)"
          - alert: GpuEccDoubleBitError
            expr: increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[1m]) > 0
            labels: {severity: critical}
            annotations:
              summary: "Double-bit ECC error on GPU {{ $labels.gpu }} ({{ $labels.node }}) -- drain node"
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: prometheus, namespace: gpu-lab}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: prometheus-gpu-lab}
rules:
  - apiGroups: [""]
    resources: [pods, nodes, endpoints, services]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: {name: prometheus-gpu-lab}
roleRef: {apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: prometheus-gpu-lab}
subjects:
  - {kind: ServiceAccount, name: prometheus, namespace: gpu-lab}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: prometheus, namespace: gpu-lab}
spec:
  replicas: 1
  selector: {matchLabels: {app: prometheus}}
  template:
    metadata: {labels: {app: prometheus}}
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=2h
          ports: [{containerPort: 9090}]
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
---
apiVersion: v1
kind: Service
metadata: {name: prometheus, namespace: gpu-lab}
spec:
  type: NodePort
  selector: {app: prometheus}
  ports: [{port: 9090, targetPort: 9090, nodePort: 30090}]
