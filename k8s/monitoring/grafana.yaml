apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-datasources, namespace: gpu-lab}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-dashboards-provider, namespace: gpu-lab}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: gpu-lab
        folder: GPU Lab
        type: file
        options: {path: /var/lib/grafana/dashboards}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: grafana-dashboard-gpu, namespace: gpu-lab}
data:
  gpu-overview.json: |
    {
      "title": "GPU Fleet Overview",
      "uid": "gpu-lab-overview",
      "schemaVersion": 39,
      "panels": [
        {"id":1,"title":"GPU Utilization %","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":0},
         "targets":[{"expr":"DCGM_FI_DEV_GPU_UTIL","legendFormat":"{{node}}/gpu{{gpu}}"}]},
        {"id":2,"title":"GPU Memory Used (MiB)","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":0},
         "targets":[{"expr":"DCGM_FI_DEV_FB_USED","legendFormat":"{{node}}/gpu{{gpu}}"}]},
        {"id":3,"title":"Memory Utilization %","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":8},
         "targets":[{"expr":"100 * DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)","legendFormat":"{{node}}/gpu{{gpu}}"}]},
        {"id":4,"title":"Tensor Core Active","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":8},
         "targets":[{"expr":"DCGM_FI_PROF_PIPE_TENSOR_ACTIVE","legendFormat":"{{node}}/gpu{{gpu}}"}]},
        {"id":5,"title":"Power (W)","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":16},
         "targets":[{"expr":"DCGM_FI_DEV_POWER_USAGE","legendFormat":"{{node}}/gpu{{gpu}}"}]},
        {"id":6,"title":"ECC DBE Errors","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":16},
         "targets":[{"expr":"DCGM_FI_DEV_ECC_DBE_VOL_TOTAL","legendFormat":"{{node}}/gpu{{gpu}}"}]}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: grafana, namespace: gpu-lab}
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          env:
            - {name: GF_SECURITY_ADMIN_USER, value: admin}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
          ports: [{containerPort: 3000}]
          volumeMounts:
            - {name: datasources, mountPath: /etc/grafana/provisioning/datasources}
            - {name: dash-provider, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards}
      volumes:
        - {name: datasources, configMap: {name: grafana-datasources}}
        - {name: dash-provider, configMap: {name: grafana-dashboards-provider}}
        - {name: dashboards, configMap: {name: grafana-dashboard-gpu}}
---
apiVersion: v1
kind: Service
metadata: {name: grafana, namespace: gpu-lab}
spec:
  type: NodePort
  selector: {app: grafana}
  ports: [{port: 3000, targetPort: 3000, nodePort: 30030}]
